name: Release
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main
jobs:
  check-env:
    runs-on: ubuntu-latest
    steps:
      - name: "Check is DIPLODOC_STORAGE_BUCKET secret exists"
        env:
          storage-bucket: ${{ vars.DIPLODOC_STORAGE_BUCKET }}
        if: ${{ env.storage-bucket == '' }}
        run: 'echo "::error:: The variable \"DIPLODOC_STORAGE_BUCKET\" has not been made; please check that all necessary secrets and variables are installed or follow the link https://diplodoc.com/quickstart" && exit 1'
  build:
    needs: check-env
    if: ${{ github.repository != 'diplodoc-platform/documentation-template' }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build
        uses: diplodoc-platform/docs-build-action@v3
        with:
          revision: "${{ github.sha }}"
          src-root: "./docs"
  upload:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Upload
        uses: diplodoc-platform/docs-upload-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          storage-endpoint: ${{ vars.DIPLODOC_STORAGE_ENDPOINT }}
          storage-region: ${{ vars.DIPLODOC_STORAGE_REGION }}
          storage-bucket: ${{ vars.DIPLODOC_STORAGE_BUCKET }}
          storage-access-key-id: ${{ secrets.DIPLODOC_ACCESS_KEY_ID }}
          storage-secret-access-key: ${{ secrets.DIPLODOC_SECRET_ACCESS_KEY }}
  release:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Debug API call
        run: |
          JSON_BODY=$(jq -n --arg rev "${{ github.sha }}" \
                          --arg ver "" \
                          --arg proj "${{ vars.DIPLODOC_STORAGE_BUCKET }}" \
                          --arg akid "${{ secrets.DIPLODOC_ACCESS_KEY_ID }}" \
                          --arg sak "${{ secrets.DIPLODOC_SECRET_ACCESS_KEY }}" \
                          '{
                            revision: $rev,
                            version: $ver,
                            project: $proj,
                            accessKeyId: $akid,
                            secretAccessKey: $sak
                          }')
          echo "Request body: $JSON_BODY"
          RESPONSE=$(curl \
            --header "Content-Type: application/json" \
            --silent \
            --output /dev/stderr \
            --write-out "\nHTTP_CODE:%{http_code}\n" \
            --data-binary "$JSON_BODY" \
            https://viewer.diplodoc.com/_/api/head 2>&1)
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          echo "HTTP Code: $HTTP_CODE"
          echo "Response Body: $RESPONSE_BODY"
      - name: Release
        uses: diplodoc-platform/docs-release-action@v2
        with:
          revision: "${{ github.sha }}"
          storage-bucket: ${{ vars.DIPLODOC_STORAGE_BUCKET }}
          storage-access-key-id: ${{ secrets.DIPLODOC_ACCESS_KEY_ID }}
          storage-secret-access-key: ${{ secrets.DIPLODOC_SECRET_ACCESS_KEY }}
          project-link: ${{ vars.DIPLODOC_PROJECT_LINK }}
