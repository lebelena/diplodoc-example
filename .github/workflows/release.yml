name: Release
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main
jobs:
  check-env:
    runs-on: ubuntu-latest
    steps:
      - name: "Check is DIPLODOC_STORAGE_BUCKET secret exists"
        env:
          storage-bucket: ${{ vars.DIPLODOC_STORAGE_BUCKET }}
        if: ${{ env.storage-bucket == '' }}
        run: 'echo "::error:: The variable \"DIPLODOC_STORAGE_BUCKET\" has not been made; please check that all necessary secrets and variables are installed or follow the link https://diplodoc.com/quickstart" && exit 1'
  build:
    needs: check-env
    if: ${{ github.repository != 'diplodoc-platform/documentation-template' }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build
        uses: diplodoc-platform/docs-build-action@v3
        with:
          revision: "${{ github.sha }}"
          src-root: "./docs"
  upload:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Upload
        uses: diplodoc-platform/docs-upload-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          storage-endpoint: ${{ vars.DIPLODOC_STORAGE_ENDPOINT }}
          storage-region: ${{ vars.DIPLODOC_STORAGE_REGION }}
          storage-bucket: ${{ vars.DIPLODOC_STORAGE_BUCKET }}
          storage-access-key-id: ${{ secrets.DIPLODOC_ACCESS_KEY_ID }}
          storage-secret-access-key: ${{ secrets.DIPLODOC_SECRET_ACCESS_KEY }}
  release:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Manual Release (full debug)
        run: |
          # Формируем JSON-тело запроса
          JSON_BODY=$(jq -n \
            --arg rev "${{ github.sha }}" \
            --arg ver "" \
            --arg proj "${{ vars.DIPLODOC_STORAGE_BUCKET }}" \
            --arg akid "${{ secrets.DIPLODOC_ACCESS_KEY_ID }}" \
            --arg sak "${{ secrets.DIPLODOC_SECRET_ACCESS_KEY }}" \
            '{
              revision: $rev,
              version: $ver,
              project: $proj,
              accessKeyId: $akid,
              secretAccessKey: $sak
            }')

          echo "=== [Debug] Request Body ==="
          echo "$JSON_BODY"

          echo "=== [Debug] Curl Command ==="
          echo "curl -k -v -X POST -H 'Content-Type: application/json' -d '$JSON_BODY' https://viewer.diplodoc.com/_/api/head"

          echo "=== [Debug] Curl Execution (verbose) ==="
          # Выполняем запрос с полным логом (-v) и сохраняем вывод
          curl -k -v -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY" \
            https://viewer.diplodoc.com/_/api/head > curl.log 2>&1 || true

          # Выводим полный лог
          echo "=== [Debug] Curl Log ==="
          cat curl.log

          # Проверяем HTTP-код ответа
          HTTP_CODE=$(grep -oP 'HTTP/\d\.\d \K\d+' curl.log | tail -1)
          echo "=== [Debug] HTTP Code ==="
          echo "$HTTP_CODE"

          # Если код не 200 — завершаем с ошибкой
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Release failed with HTTP code $HTTP_CODE"
            exit 1
          else
            echo "Release successful!"
          fi
